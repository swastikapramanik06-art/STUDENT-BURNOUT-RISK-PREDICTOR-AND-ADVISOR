{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Burnout Advisor - Login</title>
    <link rel="stylesheet" href="{% static 'accounts/css/login_style.css' %}">
    <style>
       
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .toggle-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            color: #667085; 
        }
        #password {
            padding-right: 40px; 
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <form method="POST" action="{% url 'login' %}" class="login-card">
            {% csrf_token %}

            <h2>Student Well-being Portal</h2>
            <p>Take a breath. Let's check in on your progress.</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert-error">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="input-txt">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Username"
                    autocomplete="username"
                    required>
            </div>

            <div class="input-txt">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Password"
                        autocomplete="current-password"
                        required>
                    
                    <button type="button" id="togglePassword" class="toggle-btn">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                </div>

            <div class="click-options">
                <label for="remember">
                    <input type="checkbox" id="remember" name="remember"> Remember me
                </label>
                <a href="{% url 'reset_password' %}" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="footer-text">
                <p>New here? <a href="{% url 'register' %}">Create an account</a></p>
            </div>
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
  
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            this.style.color = type === 'text' ? '#2563eb' : '#667085';
        });
    </script>
</body>
</html>
